<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samaagum — Home</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/home-views.css" />
  <link rel="stylesheet" href="../css/flows.css" />
  <link rel="stylesheet" href="../css/tailwind-output.css" />
  <style>
    html,
    body {
      background: var(--bg-2);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>window.QRCodeLib = window.QRCode;</script>
  <script>
    // Load Socket.io client library directly from backend server synchronously
    (function() {
      const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const apiBase = isLocalhost ? "http://localhost:3000" : window.location.origin;
      document.write('<script src="' + apiBase + '/socket.io/socket.io.js"><\/script>');
    })();
  </script>
  <script type="module" src="/src/home-app.tsx"></script>
</body>

</html>

</html>
