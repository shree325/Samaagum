<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samaagum — Home</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/home-views.css" />
  <link rel="stylesheet" href="../css/flows.css" />
  <link rel="stylesheet" href="../css/tailwind-output.css" />
  <style>
    html, body { background: var(--bg-2); }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Load Socket.IO from backend (async, non-blocking) -->
  <script>
    (function() {
      var isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      var apiBase = isLocalhost ? 'http://localhost:3000' : window.location.origin;
      var s = document.createElement('script');
      s.src = apiBase + '/socket.io/socket.io.js';
      s.async = true;
      s.onload = function() { window.dispatchEvent(new Event('socket-io-ready')); };
      document.head.appendChild(s);
    })();
  </script>

  <!-- Vite-bundled entry (handles all TSX imports via module graph) -->
  <script type="module" src="/src/home-app.tsx"></script>
</body>

</html>
