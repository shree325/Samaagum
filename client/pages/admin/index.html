<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samaagum — Admin Console</title>
  <meta name="description"
    content="Secure administrative gateway for tenant provisioning, KYC verifications, content moderation and dispute resolution." />
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="../../css/admin.css" />
</head>

<body>
  <div id="root"></div>

  <!-- React & Babel Standalone Libraries -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <!-- Generated Unified API Client -->
  <script type="text/babel" data-presets="env,react,typescript" src="../../src/generated/api-client.ts"></script>

  <!-- Cities View Component -->

  <script type="text/babel" data-presets="env,react,typescript" src="../../src/GeoLocationsView.tsx"></script>
  <script type="text/babel" data-presets="env,react,typescript" src="../../src/GeoIpv4View.tsx"></script>
  <script type="text/babel" data-presets="env,react,typescript" src="../../src/GeoIpv6View.tsx"></script>

  <!-- Admin React App -->
  <script type="text/babel" data-presets="env,react,typescript" src="../../src/admin-app.tsx"></script>

  <script type="text/babel" data-presets="env,react,typescript">
    // Render the App component defined in admin-app.tsx
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<window.App />);
  </script>
</body>

</html>
