openapi: 3.0.0
info:
  title: Samaagum Admin Unified API
  version: 1.0.0
  description: Type-safe Unified API contract for all Samaagum Admin Console services (RBAC, plans, coupons, users, KYC, disputes, moderation, tenants, feature flags, and audit logs).

servers:
  - url: http://localhost:3000
    description: Local development backend server

paths:
  # ── RBAC paths ─────────────────────────────────────────────────────────────
  /api/admin/rbac/roles:
    get:
      summary: Retrieve all roles
      operationId: getRoles
      responses:
        '200':
          description: A list of roles
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
    post:
      summary: Create a role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleInput'
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /api/admin/rbac/roles/{id}:
    put:
      summary: Update a role
      operationId: updateRole
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleInput'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
    delete:
      summary: Delete a role
      operationId: deleteRole
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Role deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /api/admin/rbac/responsibilities:
    get:
      summary: Retrieve all responsibilities
      operationId: getResponsibilities
